<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Bsky Theme</title>
    <style>
        body {
            font-family: system-ui, sans-serif;
            margin: 10px;
            width: 220px;
        }

        label {
            display: flex;
            align-items: center;
            margin: 6px 0;
            cursor: pointer;
        }

        input[type="radio"] {
            margin-right: 8px;
        }

        .note {
            font-size: 12px;
            color: #666;
            margin-top: 8px;
        }

        button {
            margin-top: 8px;
            padding: 6px 8px;
        }
    </style>
</head>

<body>
    <form id="theme-form">
        <label><input type="radio" name="theme" value="default" /> Default (site)</label>
        <label><input type="radio" name="theme" value="tokyonight" /> Tokyo Night</label>
        <label><input type="radio" name="theme" value="gruvbox" /> Gruvbox</label>
    </form>
    <button id="apply">Apply to current tab</button>
    <div class="note">Theme persists across pages on bsky.app</div>
    <script src="popup.js"></script>
</body>

</html>
